<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuffle Card - Boost Your Memory</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Shuffle Card</h1>
            <p class="subtitle">Improve your memory retention by 70%</p>
        </header>
        
        <div class="card-container" id="cardContainer">
            <!-- Cards will be generated by JavaScript -->
        </div>
        
        <div class="controls">
            <button id="shuffleBtn" class="btn">Shuffle Cards</button>
            <button id="resetBtn" class="btn btn-outline">Reset</button>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <span id="progressText">0/0</span>
        </div>
    </div>

    <div class="modal" id="cardModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalContent"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
